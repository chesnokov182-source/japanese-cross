<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Кроссворд по японскому языку (JLPT)</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/wanakana@5.0.2/wanakana.min.js"></script>
</head>
<body>
<div class="crossword-container">
    <div class="grid-section">
        <div class="level-selector">
            <span>Уровень JLPT:</span>
            <select id="levelSelect">
                <option value="n5">N5 (начальный)</option>
                <option value="n4">N4 (базовый)</option>
                <option value="n3">N3 (средний)</option>
                <option value="n2">N2 (выше среднего)</option>
                <option value="n1">N1 (продвинутый)</option>
            </select>
            <button id="resetBtn">Сбросить кроссворд</button>
        </div>
        <div id="gridContainer" class="crossword-grid"></div>
        <div class="status" id="statusMsg"></div>
    </div>
    <div class="clues-section">
        <div id="cluesContainer"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
